---
- name: Create deployment directory
  file:
    path: "{{ deploy_dir }}"
    state: directory
    mode: '0755'

- name: Copy docker-compose.yml to server
  copy:
    src: ../../../../docker-compose.yml
    dest: "{{ deploy_dir }}/docker-compose.yml"
    mode: '0644'
    force: yes

- name: Copy .env file to server if it exists
  copy:
    src: ../../../../.env
    dest: "{{ deploy_dir }}/.env"
    mode: '0600'
    force: yes
  ignore_errors: yes
