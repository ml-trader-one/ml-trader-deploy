services:
  postgres:
    image: postgres:16-alpine
    container_name: market_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_data"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: market_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: market_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: market_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  prometheus:
    image: prom/prometheus:latest
    container_name: market_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - "--storage.tsdb.path=/prometheus"
      - '--storage.tsdb.retention.time=15d'
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: market_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATASOURCES_DEFAULT_URL: http://prometheus:9090
    ports:
      - "127.0.0.1:3000:3000"

  loki:
    image: grafana/loki:latest
    container_name: market_loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    container_name: market_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:postgres@postgres:5432/market_data
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
      MLFLOW_ALLOW_INSECURE_HOSTS: "true"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    entrypoint: >
      bash -c "pip install psycopg2-binary --quiet &&
      python -c \"import psycopg2; conn = psycopg2.connect('postgresql://postgres:postgres@postgres:5432/market_data'); conn.autocommit = True; conn.cursor().execute('CREATE SCHEMA IF NOT EXISTS mlflow;')\" &&
      mlflow server
      --backend-store-uri 'postgresql://postgres:postgres@postgres:5432/market_data?options=-c%20search_path%3Dmlflow'
      --default-artifact-root mlflow-artifacts:/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'
      --serve-artifacts"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  data-ingestion-service:
    build: ../data-ingestion-service
    container_name: data_ingestion
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - INVEST_TOKEN=${INVEST_TOKEN}
      - STREAM_INTERVAL=${STREAM_INTERVAL:-SUBSCRIPTION_INTERVAL_ONE_MINUTE}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=market_data
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - LOKI_URL=http://loki:3100
    ports:
      - "127.0.0.1:8001:8000"

  data-feature-engineering-service:
    build: ../data-feature-engineering-service
    container_name: data_feature_engineering
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=market_data
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - LOKI_URL=http://loki:3100
    ports:
      - "127.0.0.1:8002:8000"

  model-processing-service:
    build: ../model-processing-service
    container_name: model_processing
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=market_data
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - LOKI_URL=http://loki:3100
    volumes:
      - model_data:/app/models
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "127.0.0.1:8003:8000"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  model_data:
  mlflow_artifacts:
